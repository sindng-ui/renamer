name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Compile Vite Frontend Assets
        run: npm run build

      - name: Setup Java Development Kit (JDK) 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK Command-line Tools
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor Web Assets to Native Android Project
        run: npx cap sync android

      - name: Grant Execute Permission for Gradle Wrapper
        run: |
          sed -i -e 's/\r$//' android/gradlew
          chmod +x android/gradlew

      - name: Build Android Debug APK with Gradle
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Debug APK Artifact for Download
        uses: actions/upload-artifact@v4
        with:
          name: renamer-app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
